<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadFlow — Data Migration Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #1e293b; border-radius: 20px; padding: 48px; max-width: 600px; width: 100%; border: 1px solid #334155; }
  h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg,#3b82f6,#8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  p { color: #94a3b8; margin-bottom: 24px; font-size: 15px; line-height: 1.6; }
  label { display: block; font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 8px; }
  input { width: 100%; padding: 12px 16px; background: #0f172a; border: 1.5px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 14px; font-family: inherit; margin-bottom: 16px; }
  input:focus { outline: none; border-color: #3b82f6; }
  textarea { width: 100%; padding: 12px 16px; background: #0f172a; border: 1.5px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 13px; font-family: 'Courier New', monospace; margin-bottom: 16px; height: 200px; resize: vertical; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; transition: all 0.2s; }
  .btn-primary { background: linear-gradient(135deg,#3b82f6,#2563eb); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.4); }
  .btn-secondary { background: #334155; color: #e2e8f0; margin-right: 8px; }
  .steps { display: flex; gap: 12px; margin-bottom: 24px; }
  .step { flex: 1; background: #0f172a; border-radius: 10px; padding: 12px; border: 1px solid #334155; font-size: 12px; color: #94a3b8; }
  .step strong { display: block; color: #3b82f6; font-size: 14px; margin-bottom: 4px; }
  .result { background: #0f172a; border-radius: 10px; padding: 16px; margin-top: 16px; font-size: 13px; display: none; }
  .result.success { border: 1px solid #10b981; color: #10b981; }
  .result.error { border: 1px solid #ef4444; color: #ef4444; }
  hr { border: none; border-top: 1px solid #334155; margin: 24px 0; }
</style>
</head>
<body>
<div class="card">
  <h1>📦 LeadFlow Migration Tool</h1>
  <p>Import your existing LeadFlow data (from the old single-file app) into your new cloud account.</p>

  <div class="steps">
    <div class="step"><strong>Step 1</strong>Open old LeadFlow app → Settings → Export All Data</div>
    <div class="step"><strong>Step 2</strong>Paste the exported JSON below</div>
    <div class="step"><strong>Step 3</strong>Enter your new account credentials and click Import</div>
  </div>

  <hr>

  <label>API Server URL</label>
  <input type="url" id="apiUrl" value="http://localhost:3001/api" placeholder="https://your-app.onrender.com/api">

  <label>Your Email</label>
  <input type="email" id="email" placeholder="your@email.com">

  <label>Your Password</label>
  <input type="password" id="password" placeholder="Your password">

  <label>Exported JSON Data</label>
  <textarea id="jsonData" placeholder='Paste your exported LeadFlow JSON here...
{"leads":[...],"clients":[...],"invoices":[...],...}'></textarea>

  <button class="btn btn-secondary" onclick="loadFromOldApp()">🔄 Auto-Load from Old App (if open)</button>
  <button class="btn btn-primary" onclick="doMigrate()">📤 Import to Cloud</button>

  <div id="result" class="result"></div>
</div>

<script>
async function doMigrate() {
  const apiUrl   = document.getElementById('apiUrl').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const jsonText = document.getElementById('jsonData').value.trim();
  const result   = document.getElementById('result');

  if (!apiUrl || !email || !password || !jsonText) {
    showResult('error', 'Please fill in all fields.');
    return;
  }

  let data;
  try { data = JSON.parse(jsonText); }
  catch { showResult('error', 'Invalid JSON. Please check the exported data.'); return; }

  showResult('', 'Logging in...');
  try {
    // Login
    const loginResp = await fetch(apiUrl + '/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const loginData = await loginResp.json();
    if (!loginResp.ok) throw new Error(loginData.error || 'Login failed');

    const token = loginData.accessToken;
    showResult('', 'Importing data... this may take a moment...');

    const migrResp = await fetch(apiUrl + '/migrate/import', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(data)
    });
    const migrData = await migrResp.json();
    if (!migrResp.ok) throw new Error(migrData.error || 'Migration failed');

    showResult('success', '✅ ' + (migrData.message || 'Migration successful!'));
  } catch (err) {
    showResult('error', '❌ Error: ' + err.message);
  }
}

function loadFromOldApp() {
  // Try to read from localStorage (if old app is on same origin)
  try {
    const keys = ['leads','contacts','clients','products','quotes','invoices','payments','activities','templates','settings'];
    const data = {};
    keys.forEach(k => {
      try { data[k] = JSON.parse(localStorage.getItem('lf_'+k) || 'null'); } catch {}
    });
    const hasData = Object.values(data).some(v => v && (Array.isArray(v) ? v.length > 0 : true));
    if (!hasData) { alert('No LeadFlow data found in localStorage. Open the old app first, or paste JSON manually.'); return; }
    document.getElementById('jsonData').value = JSON.stringify(data, null, 2);
    alert('Data loaded from browser! Review and click Import.');
  } catch (err) {
    alert('Could not auto-load: ' + err.message + '. Please export manually from the old app.');
  }
}

function showResult(type, msg) {
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.className = 'result ' + type;
  el.textContent = msg;
}
</script>
</body>
</html>
