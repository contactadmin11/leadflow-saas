# Fly.io deployment config for LeadFlow SaaS
# Deploy with: flyctl deploy
app = "leadflow-crm-india"     # Your app URL: https://leadflow-crm-india.fly.dev
primary_region = "bom"         # Mumbai region (closest to India)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false   # NO AUTO-SLEEP!
  auto_start_machines = true
  min_machines_running = 1     # Always keep 1 machine alive

  [http_service.concurrency]
    type = "connections"
    hard_limit = 500
    soft_limit = 200

[[vm]]
  memory = "256mb"             # Free tier: 256MB RAM
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "leadflow_wa"
  destination = "/app/wa_sessions"
  initial_size = "1gb"
